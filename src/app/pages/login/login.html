<div class="login-container">

  <div class="login-card">

    <h1>🏥 SwasthAi</h1> 

    <p>District Health Centre Management System</p>

    <input
      type="text"
      placeholder="Username"

      type="password"
      placeholder="Password"

    <button (click)="login()">
      Login
    </button>

  </div>

</div>
